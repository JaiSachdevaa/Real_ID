<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — REAL ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .login-wrapper {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }
        .page-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .page-logo a {
            font-family: 'Syne', sans-serif;
            font-size: 2rem; font-weight: 800;
            text-decoration: none;
            color: var(--text-primary);
        }
        .page-logo a span {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3rem 2.8rem;
            backdrop-filter: blur(30px) saturate(180%);
            box-shadow: var(--shadow-card);
            opacity: 0;
            transform: translateY(30px);
        }
        .login-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.7rem; font-weight: 800;
            margin-bottom: 0.4rem;
        }
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 2.2rem;
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--btn-primary-bg);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem; font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 20px var(--btn-primary-shadow);
            margin-top: 0.5rem;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--btn-primary-shadow); }
        .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
        .register-prompt {
            text-align: center;
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-top: 1.8rem;
        }
        .register-prompt a { color: var(--accent-cyan); text-decoration: none; font-weight: 600; }
        .register-prompt a:hover { text-decoration: underline; }
        .corner-theme-toggle { position: fixed; top: 1.2rem; right: 1.5rem; z-index: 999; }
        .security-badge {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            margin-top: 1.8rem; font-size: 0.78rem; color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="corner-theme-toggle">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="theme-icon">☀️</span>
        </button>
    </div>

    <div class="login-wrapper">
        <div class="page-logo">
            <a href="/">REAL<span>ID</span></a>
        </div>

        <div class="login-card" id="loginCard">
            <a href="/" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Home
            </a>

            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Enter your email to continue</p>

            <div id="loginAlert" class="alert alert-error"></div>
            <div id="loginSuccess" class="alert alert-success"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    Continue
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <p class="register-prompt">
                Don't have an account? <a href="/register">Create one now</a>
            </p>

            <div class="security-badge">
                <span>🔒</span> Secured with AES-256 encryption
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='shared.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof gsap !== 'undefined') {
                gsap.to('#loginCard', { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out', delay: 0.2 });
            } else {
                document.getElementById('loginCard').style.cssText += 'opacity:1;transform:none;transition:opacity 0.5s,transform 0.5s;';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submitBtn');

            document.getElementById('loginAlert').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');

            if (!email) {
                showAlert('loginAlert', 'Please enter your email address.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Checking...';

            try {
                const res = await fetch('/check_email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    showAlert('loginSuccess', 'Email verified! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/auth_method', 1000);
                } else {
                    showAlert('loginAlert', data.error || 'Email not found. Please register first.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Continue <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
                }
            } catch {
                showAlert('loginAlert', 'Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Continue <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
            }
        });
    </script>
</body>
</html>
