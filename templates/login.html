<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — REAL ID</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .auth-wrapper { width: 100%; max-width: 400px; }
        .page-logo { text-align: center; margin-bottom: 1.75rem; }
        .page-logo a { font-weight: 700; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .page-logo a span { color: var(--accent); }
        .auth-card { padding: 2.25rem 2rem; }
        .auth-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--text); }
        .auth-subtitle { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 1.75rem; }
        .submit-btn { width: 100%; margin-top: 0.3rem; }
        .auth-prompt { text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 1.5rem; }
        .auth-prompt a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-prompt a:hover { text-decoration: underline; }
        .corner-theme-toggle { position: fixed; top: 1.2rem; right: 1.5rem; }
        .security-note {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            margin-top: 1.5rem; font-size: 0.76rem; color: var(--text-muted);
        }
        .security-note svg { width: 13px; height: 13px; }
        .alert { margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="corner-theme-toggle">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="page-logo">
            <a href="/">REAL<span>ID</span></a>
        </div>

        <div class="card auth-card">
            <a href="/" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to home
            </a>

            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Enter your email to continue to your vault</p>

            <div id="loginAlert"   class="alert alert-error"></div>
            <div id="loginSuccess" class="alert alert-success"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">
                    Continue
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <p class="auth-prompt">
                Don't have an account? <a href="/register">Create one</a>
            </p>
        </div>

        <div class="security-note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Secured with biometric authentication
        </div>
    </div>

    <script src="{{ url_for('static', filename='shared.js') }}"></script>
    <script>
        const continueBtnHTML = document.getElementById('submitBtn').innerHTML;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn   = document.getElementById('submitBtn');
            document.getElementById('loginAlert').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');

            if (!email) {
                showAlert('loginAlert', 'Please enter your email address.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Checking...';

            try {
                const res  = await fetch('/check_email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    showAlert('loginSuccess', 'Email verified. Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/auth_method', 800);
                } else {
                    showAlert('loginAlert', data.error || 'Email not found. Please register first.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = continueBtnHTML;
                }
            } catch {
                showAlert('loginAlert', 'Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = continueBtnHTML;
            }
        });
    </script>
</body>
</html>
