<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — REAL ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .register-wrapper {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        .page-logo {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .page-logo a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .page-logo a span {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .register-card {
            background: var(--glass-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem 2.8rem;
            backdrop-filter: blur(32px) saturate(160%);
            box-shadow: var(--shadow-card);
            opacity: 0;
            transform: translateY(30px);
            position: relative;
            overflow: hidden;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-indigo), var(--accent-cyan), transparent);
        }

        .register-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2.5px;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
        }

        .register-subtitle {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 2.4rem;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--btn-primary-bg);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 22px var(--btn-primary-shadow);
            margin-top: 0.5rem;
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--btn-primary-shadow); filter: brightness(1.08); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .login-prompt {
            text-align: center;
            font-size: 0.86rem;
            color: var(--text-secondary);
            margin-top: 1.8rem;
        }

        .login-prompt a { color: var(--accent-cyan); text-decoration: none; font-weight: 600; }
        .login-prompt a:hover { text-decoration: underline; }

        .corner-theme-toggle { position: fixed; top: 1.2rem; right: 1.5rem; z-index: 999; }

        /* Verify button in modal */
        .verify-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--btn-primary-bg);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 22px var(--btn-primary-shadow);
        }

        .verify-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
        .verify-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .modal-content h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 2px; margin-bottom: 0.6rem; }
        .modal-content p  { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.92rem; }
        .modal-content strong { color: var(--accent-cyan); }
    </style>
</head>
<body>

    <div class="corner-theme-toggle">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="theme-icon">☀️</span>
        </button>
    </div>

    <div class="register-wrapper">
        <div class="page-logo">
            <a href="/">REAL<span>ID</span></a>
        </div>

        <div class="register-card" id="registerCard">
            <a href="/" class="back-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Home
            </a>

            <h1 class="register-title">CREATE ACCOUNT</h1>
            <p class="register-subtitle">Join thousands securing their passwords with biometrics</p>

            <div id="registerAlert"   class="alert alert-error"></div>
            <div id="registerSuccess" class="alert alert-success"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        class="form-input"
                        placeholder="John Doe"
                        required
                        autocomplete="name"
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    Continue with Email Verification
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <p class="login-prompt">
                Already have an account? <a href="/login">Sign in</a>
            </p>
        </div>
    </div>

    <!-- OTP MODAL -->
    <div id="otpModal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div style="font-size:2.5rem;margin-bottom:1rem;">✉️</div>
            <h3>VERIFY EMAIL</h3>
            <p>We've sent a 6-digit code to <strong id="emailDisplay"></strong></p>
            <input
                type="text"
                inputmode="numeric"
                class="otp-input"
                id="otpInput"
                placeholder="000000"
                maxlength="6"
                autocomplete="one-time-code"
            >
            <div id="otpAlert" class="alert alert-error" style="margin-bottom:1rem;text-align:left;"></div>
            <button class="verify-btn" id="verifyBtn" onclick="verifyOTP()">
                Verify & Continue
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='shared.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof gsap !== 'undefined') {
                gsap.to('#registerCard', { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out', delay: 0.2 });
            } else {
                document.getElementById('registerCard').style.cssText += 'opacity:1;transform:none;transition:opacity 0.5s,transform 0.5s;';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name  = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const btn   = document.getElementById('submitBtn');
            document.getElementById('registerAlert').classList.remove('show');

            if (!name || !email) {
                showAlert('registerAlert', 'Please fill in all fields.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending verification email...';

            try {
                const res  = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('emailDisplay').textContent = email;
                    document.getElementById('otpModal').classList.add('show');
                    document.getElementById('otpInput').focus();
                } else {
                    showAlert('registerAlert', data.error || 'Registration failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Continue with Email Verification <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
                }
            } catch {
                showAlert('registerAlert', 'Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Continue with Email Verification <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
            }
        });

        async function verifyOTP() {
            const otp = document.getElementById('otpInput').value.trim();
            const btn = document.getElementById('verifyBtn');
            document.getElementById('otpAlert').classList.remove('show');

            if (otp.length !== 6) {
                showAlert('otpAlert', 'Please enter the 6-digit OTP.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
                const res  = await fetch('/verify_register_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/register_face';
                } else {
                    showAlert('otpAlert', data.error || 'Invalid OTP. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Verify & Continue <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
                }
            } catch {
                showAlert('otpAlert', 'Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Verify & Continue <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
            }
        }

        document.getElementById('otpInput').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            if (e.target.value.length === 6) verifyOTP();
        });

        document.getElementById('otpInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyOTP();
        });
    </script>
</body>
</html>
