<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — REAL ID</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .auth-wrapper { width: 100%; max-width: 420px; }
        .page-logo { text-align: center; margin-bottom: 1.75rem; }
        .page-logo a { font-weight: 700; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .page-logo a span { color: var(--accent); }

        /* Onboarding progress */
        .progress-steps { display: flex; align-items: center; justify-content: center; gap: 0.4rem; margin-bottom: 1.75rem; }
        .progress-step {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.76rem; font-weight: 600; color: var(--text-muted);
        }
        .progress-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1.5px solid var(--border-strong);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.68rem; color: var(--text-muted);
        }
        .progress-step.active .progress-dot { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
        .progress-step.active { color: var(--text); }
        .progress-line { width: 24px; height: 1px; background: var(--border); }

        .auth-card { padding: 2.25rem 2rem; }
        .auth-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--text); }
        .auth-subtitle { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 1.75rem; }
        .submit-btn { width: 100%; margin-top: 0.3rem; }
        .auth-prompt { text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 1.5rem; }
        .auth-prompt a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-prompt a:hover { text-decoration: underline; }
        .corner-theme-toggle { position: fixed; top: 1.2rem; right: 1.5rem; }
        .alert { margin-bottom: 1rem; }
        .verify-btn { width: 100%; }
        .modal-content .modal-icon {
            width: 40px; height: 40px; border-radius: 9px;
            background: var(--accent-subtle); color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1rem;
        }
        .modal-content .modal-icon svg { width: 20px; height: 20px; }
    </style>
</head>
<body>

    <div class="corner-theme-toggle">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="page-logo">
            <a href="/">REAL<span>ID</span></a>
        </div>

        <div class="progress-steps">
            <div class="progress-step active"><span class="progress-dot">1</span>Account</div>
            <div class="progress-line"></div>
            <div class="progress-step"><span class="progress-dot">2</span>Verify</div>
            <div class="progress-line"></div>
            <div class="progress-step"><span class="progress-dot">3</span>Face</div>
        </div>

        <div class="card auth-card">
            <a href="/" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to home
            </a>

            <h1 class="auth-title">Create your account</h1>
            <p class="auth-subtitle">Set up biometric login for your passwords</p>

            <div id="registerAlert"   class="alert alert-error"></div>
            <div id="registerSuccess" class="alert alert-success"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="name">Full name</label>
                    <input
                        type="text"
                        id="name"
                        class="form-input"
                        placeholder="Jane Doe"
                        required
                        autocomplete="name"
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">
                    Continue
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <p class="auth-prompt">
                Already have an account? <a href="/login">Sign in</a>
            </p>
        </div>
    </div>

    <!-- OTP MODAL -->
    <div id="otpModal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            </div>
            <h3>Verify your email</h3>
            <p>We've sent a 6-digit code to <strong id="emailDisplay" style="color:var(--text);"></strong></p>
            <input
                type="text"
                inputmode="numeric"
                class="otp-input"
                id="otpInput"
                placeholder="000000"
                maxlength="6"
                autocomplete="one-time-code"
            >
            <div id="otpAlert" class="alert alert-error" style="margin-bottom:1rem;"></div>
            <button class="btn btn-primary verify-btn" id="verifyBtn" onclick="verifyOTP()">
                Verify and continue
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='shared.js') }}"></script>
    <script>
        const registerBtnHTML = document.getElementById('submitBtn').innerHTML;
        const verifyBtnHTML   = document.getElementById('verifyBtn').innerHTML;

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name  = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const btn   = document.getElementById('submitBtn');
            document.getElementById('registerAlert').classList.remove('show');

            if (!name || !email) {
                showAlert('registerAlert', 'Please fill in all fields.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending verification email...';

            try {
                const res  = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('emailDisplay').textContent = email;
                    document.getElementById('otpModal').classList.add('show');
                    document.getElementById('otpInput').focus();
                } else {
                    showAlert('registerAlert', data.error || 'Registration failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = registerBtnHTML;
                }
            } catch {
                showAlert('registerAlert', 'Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = registerBtnHTML;
            }
        });

        async function verifyOTP() {
            const otp = document.getElementById('otpInput').value.trim();
            const btn = document.getElementById('verifyBtn');
            document.getElementById('otpAlert').classList.remove('show');

            if (otp.length !== 6) {
                showAlert('otpAlert', 'Please enter the 6-digit OTP.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
                const res  = await fetch('/verify_register_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/register_face';
                } else {
                    showAlert('otpAlert', data.error || 'Invalid OTP. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = verifyBtnHTML;
                }
            } catch {
                showAlert('otpAlert', 'Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = verifyBtnHTML;
            }
        }

        document.getElementById('otpInput').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            if (e.target.value.length === 6) verifyOTP();
        });

        document.getElementById('otpInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyOTP();
        });
    </script>
</body>
</html>
