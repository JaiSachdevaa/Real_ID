<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register your face — REAL ID</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { width: 100%; max-width: 460px; }
        .page-logo { text-align: center; margin-bottom: 1.75rem; }
        .page-logo a { font-weight: 700; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .page-logo a span { color: var(--accent); }

        .progress-steps { display: flex; align-items: center; justify-content: center; gap: 0.4rem; margin-bottom: 1.75rem; }
        .progress-step { display: flex; align-items: center; gap: 0.4rem; font-size: 0.76rem; font-weight: 600; color: var(--text-muted); }
        .progress-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1.5px solid var(--border-strong);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.68rem; color: var(--text-muted);
        }
        .progress-step.active .progress-dot, .progress-step.done .progress-dot { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
        .progress-step.active, .progress-step.done { color: var(--text); }
        .progress-line { width: 24px; height: 1px; background: var(--border); }

        .register-box { padding: 2.25rem 2rem; text-align: center; }
        .auth-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--text); }
        .auth-subtitle { color: var(--text-secondary); margin-bottom: 1.75rem; font-size: 0.9rem; }

        .tips-list { text-align: left; margin-bottom: 1.75rem; }
        .tips-list-title { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.6rem; }
        .tip-row { display: flex; align-items: center; gap: 0.55rem; padding: 0.3rem 0; font-size: 0.86rem; color: var(--text-secondary); }
        .tip-row svg { width: 15px; height: 15px; color: var(--success); flex-shrink: 0; }

        /* Windows-Hello style circular capture */
        .capture-circle {
            position: relative;
            width: 220px; height: 220px;
            margin: 0 auto 1.4rem;
            border-radius: 50%;
            background: var(--bg-subtle);
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .capture-circle.active { border-color: var(--accent); }
        #videoElement {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: none;
        }
        #videoElement.visible { display: block; }
        #canvas { display: none; }
        .capture-placeholder { color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .capture-placeholder svg { width: 34px; height: 34px; }
        .capture-placeholder span { font-size: 0.78rem; }

        .status-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
        .status-row {
            display: flex; align-items: center; gap: 0.55rem;
            font-size: 0.86rem; color: var(--text-muted);
            padding: 0.3rem 0.5rem;
        }
        .status-row .dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .status-row.ok { color: var(--text); }
        .status-row.ok .dot { border-color: var(--success); background: var(--success-subtle); }
        .status-row.ok .dot svg { width: 10px; height: 10px; color: var(--success); }
        .status-row.busy .dot { border-color: var(--accent); }

        .btn-capture { width: 100%; }
        .error-message, .success-message {
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            margin-top: 1rem;
            font-size: 0.84rem;
            display: none;
            text-align: left;
        }
        .error-message { background: var(--danger-subtle); border: 1px solid var(--danger-border); color: var(--danger); }
        .success-message { background: var(--success-subtle); border: 1px solid var(--success-border); color: var(--success); }
        .error-message.show, .success-message.show { display: block; }

        .corner-theme-toggle { position: fixed; top: 1.2rem; right: 1.5rem; }
    </style>
</head>
<body>

    <div class="corner-theme-toggle">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <div class="container">
        <div class="page-logo">
            <a href="/">REAL<span>ID</span></a>
        </div>

        <div class="progress-steps">
            <div class="progress-step done"><span class="progress-dot">1</span>Account</div>
            <div class="progress-line"></div>
            <div class="progress-step done"><span class="progress-dot">2</span>Verify</div>
            <div class="progress-line"></div>
            <div class="progress-step active"><span class="progress-dot">3</span>Face</div>
        </div>

        <div class="card register-box">
            <h1 class="auth-title">Register your face</h1>
            <p class="auth-subtitle">This is what REAL ID will match against when you sign in</p>

            <div class="tips-list">
                <div class="tips-list-title">For best results</div>
                <div class="tip-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Good, even lighting on your face</div>
                <div class="tip-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Look directly at the camera</div>
                <div class="tip-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Remove glasses if possible</div>
                <div class="tip-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Keep a neutral expression</div>
            </div>

            <div class="capture-circle" id="captureCircle">
                <div class="capture-placeholder" id="capturePlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2Z"/><circle cx="12" cy="13" r="4"/></svg>
                    <span>Camera preview</span>
                </div>
                <video id="videoElement" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>

            <div class="status-list" id="statusList">
                <div class="status-row" id="statusRow"><span class="dot"></span><span id="statusText">Click "Start camera" to begin</span></div>
            </div>

            <button class="btn btn-primary btn-capture" id="startCameraBtn" onclick="startCamera()" style="margin-bottom:0.6rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2Z"/><circle cx="12" cy="13" r="4"/></svg>
                Start camera
            </button>

            <button class="btn btn-primary btn-capture" id="captureBtn" onclick="captureFace()" style="display:none;">
                Capture and complete registration
            </button>

            <div id="errorMessage"   class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='shared.js') }}"></script>
    <script>
        const videoElement      = document.getElementById('videoElement');
        const canvas            = document.getElementById('canvas');
        const captureBtn        = document.getElementById('captureBtn');
        const startCameraBtn    = document.getElementById('startCameraBtn');
        const errorMessage      = document.getElementById('errorMessage');
        const successMessage    = document.getElementById('successMessage');
        const statusText        = document.getElementById('statusText');
        const statusRow         = document.getElementById('statusRow');
        const capturePlaceholder = document.getElementById('capturePlaceholder');
        const captureCircle     = document.getElementById('captureCircle');
        const captureBtnHTML    = captureBtn.innerHTML;

        let stream = null;

        function setStatus(text, state) {
            statusText.textContent = text;
            statusRow.className = 'status-row' + (state ? ' ' + state : '');
            statusRow.querySelector('.dot').innerHTML = state === 'ok'
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
                : '';
        }

        async function startCamera() {
            try {
                setStatus('Requesting camera access...', 'busy');
                startCameraBtn.disabled = true;
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
                });
                videoElement.srcObject = stream;
                videoElement.classList.add('visible');
                capturePlaceholder.style.display = 'none';
                captureCircle.classList.add('active');
                videoElement.onloadedmetadata = () => {
                    setStatus('Camera ready — position your face in the circle', 'ok');
                    startCameraBtn.style.display = 'none';
                    captureBtn.style.display     = 'block';
                };
            } catch (error) {
                let errorMsg = 'Camera access denied. ';
                if      (error.name === 'NotAllowedError')  errorMsg += 'Please allow camera access and refresh the page.';
                else if (error.name === 'NotFoundError')    errorMsg += 'No camera found on your device.';
                else if (error.name === 'NotReadableError') errorMsg += 'Camera is already in use by another application.';
                else errorMsg += error.message;
                setStatus('Camera error', null);
                startCameraBtn.disabled = false;
                showError(errorMsg);
            }
        }

        async function captureFace() {
            if (!stream) { showError('Please start the camera first'); return; }
            captureBtn.disabled = true;
            captureBtn.innerHTML = '<span class="spinner"></span> Capturing...';
            setStatus('Capturing your face...', 'busy');
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            try {
                canvas.width  = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('image', blob, 'face.jpg');
                    try {
                        const response = await fetch('/capture_face', { method: 'POST', body: formData });
                        const data     = await response.json();
                        if (data.success) {
                            if (stream) stream.getTracks().forEach(track => track.stop());
                            successMessage.textContent = 'Face registered successfully. Redirecting to your vault...';
                            successMessage.classList.add('show');
                            setStatus('Registration complete', 'ok');
                            setTimeout(() => { window.location.href = '/vault'; }, 1800);
                        } else {
                            showError(data.error || 'Failed to capture face. Please try again.');
                            captureBtn.disabled     = false;
                            captureBtn.innerHTML    = 'Try again';
                            setStatus('Position your face within the circle', null);
                        }
                    } catch (error) {
                        showError('Connection error. Please try again.');
                        captureBtn.disabled  = false;
                        captureBtn.innerHTML = 'Try again';
                    }
                }, 'image/jpeg', 0.95);
            } catch (error) {
                showError('Failed to capture image. Please try again.');
                captureBtn.disabled  = false;
                captureBtn.innerHTML = 'Try again';
                setStatus('Error occurred. Please try again.', null);
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
        });
    </script>
</body>
</html>
